<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이벤트메이트</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
</head>
<body>
  <section id="screen-home" class="screen active">
    <div class="home-wrapper">
      <div class="logo-badge">AI 이벤트 추천</div>
      <h1 class="home-title">이벤트메이트</h1>
      <p class="home-sub">서버 분위기에 맞는 이벤트를<br />AI가 추천해드려요.</p>
      <div class="home-chips">
        <span class="chip">게임 서버</span>
        <span class="chip">친목 서버</span>
        <span class="chip">공부 서버</span>
        <span class="chip">덕질 서버</span>
      </div>
      <button class="btn-primary" id="btn-start" type="button">시작하기</button>
      <button class="btn-ghost" id="btn-saved-home" type="button">저장된 이벤트 보기</button>
    </div>
  </section>

  <section id="screen-form" class="screen">
    <div class="form-wrapper">
      <div class="form-header">
        <button class="btn-back" id="btn-back-form" type="button">← 뒤로</button>
        <h2>이벤트 정보 입력</h2>
        <p class="form-desc">목적과 분위기를 입력하면 딱 맞는 이벤트를 추천해드릴게요.</p>
      </div>

      <div class="form-card">
        <div class="field-group">
          <label>이벤트 목적 <span class="req">*</span></label>
          <div class="chip-select" id="eventPurpose">
            <button class="chip-btn" type="button" data-val="친목 활성화">친목 활성화</button>
            <button class="chip-btn" type="button" data-val="신규 유저 적응">신규 유저 적응</button>
            <button class="chip-btn" type="button" data-val="기존 유저 재참여">기존 유저 재참여</button>
            <button class="chip-btn" type="button" data-val="커플·썸 분위기">커플·썸 분위기</button>
            <button class="chip-btn" type="button" data-val="게임·대회">게임·대회</button>
            <button class="chip-btn" type="button" data-val="덕질·취향 공유">덕질·취향 공유</button>
            <button class="chip-btn" type="button" data-val="가벼운 재미">가벼운 재미</button>
            <button class="chip-btn" type="button" data-val="기타">기타</button>
          </div>
        </div>

        <div class="field-group">
          <label for="memberCount">서버 인원수 <span class="req">*</span></label>
          <input type="number" id="memberCount" placeholder="예: 50" min="1" />
        </div>

        <div class="field-group">
          <label>주 활동 시간대 <span class="req">*</span></label>
          <div class="chip-select" id="activeTime">
            <button class="chip-btn" type="button" data-val="오전">오전</button>
            <button class="chip-btn" type="button" data-val="오후">오후</button>
            <button class="chip-btn" type="button" data-val="저녁">저녁</button>
            <button class="chip-btn" type="button" data-val="심야">심야</button>
            <button class="chip-btn" type="button" data-val="주말">주말</button>
          </div>
        </div>

        <div class="field-group">
          <label>원하는 분위기 <span class="req">*</span></label>
          <div class="chip-select" id="vibe">
            <button class="chip-btn" type="button" data-val="가볍게">가볍게</button>
            <button class="chip-btn" type="button" data-val="웃기게">웃기게</button>
            <button class="chip-btn" type="button" data-val="설레게">설레게</button>
            <button class="chip-btn" type="button" data-val="진지하게">진지하게</button>
            <button class="chip-btn" type="button" data-val="오래 참여하게">오래 참여하게</button>
          </div>
        </div>

        <div class="field-group">
          <label>운영진이 쓸 수 있는 시간</label>
          <div class="chip-select" id="difficulty">
            <button class="chip-btn" type="button" data-val="10분 이내">10분 이내</button>
            <button class="chip-btn selected" type="button" data-val="30분 정도">30분 정도</button>
            <button class="chip-btn" type="button" data-val="1시간 이상">1시간 이상</button>
          </div>
        </div>

        <div class="field-group">
          <label for="extraRequest">추가 요청사항</label>
          <textarea id="extraRequest" placeholder="예: 상품 없이 진행하고 싶어요, 하루 안에 끝나는 이벤트가 좋아요." rows="3"></textarea>
        </div>

        <button class="btn-primary full" id="btn-generate" type="button">이벤트 추천받기</button>
      </div>
    </div>
  </section>

  <section id="screen-result" class="screen">
    <div class="result-wrapper">
      <div class="form-header">
        <button class="btn-back" id="btn-back-result" type="button">← 다시 입력</button>
        <h2>추천 이벤트</h2>
      </div>

      <div id="loading-box" class="loading-box hidden">
        <div class="spinner"></div>
        <p>AI가 이벤트를 만들고 있어요<span class="dot-anim"></span></p>
      </div>

      <div id="result-card" class="result-card hidden"></div>

      <div id="result-actions" class="result-actions hidden">
        <button class="btn-primary" id="btn-retry" type="button">다시 추천</button>
        <button class="btn-secondary" id="btn-copy" type="button">결과 복사</button>
        <button class="btn-secondary" id="btn-save" type="button">이벤트 저장</button>
      </div>
    </div>
  </section>

  <section id="screen-saved" class="screen">
    <div class="saved-wrapper">
      <div class="form-header">
        <button class="btn-back" id="btn-back-saved" type="button">← 홈으로</button>
        <h2>저장된 이벤트</h2>
      </div>
      <div id="saved-list"></div>
    </div>
  </section>

  <script src="script.js" defer></script>
</body>
</html>
